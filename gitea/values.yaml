# Gitea Helm chart values
#
# Chart : oci://docker.gitea.com/charts/gitea (version 12.5.0)
# Target: RKE2 cluster, namespace `gitea`
# Persistence: Longhorn RWO, 10Gi PVC `gitea-shared-storage`
#
# Backends (managed out-of-band, see gitea/k8s/ for the StatefulSet manifests):
#   - database: PostgreSQL 17 on `gitea-postgres` (StatefulSet, 5Gi PVC)
#   - cache / session / queue: Redis 7 on `gitea-redis` (StatefulSet, 1Gi PVC)
#
# Because the data/queue/cache/session backends now live outside the Gitea
# pod, the rollout strategy is back to RollingUpdate. The LevelDB lock
# deadlock that forced `Recreate` is no longer a constraint.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# admin section is intentionally empty so that the chart's init container
# skips admin user creation/update logic. The existing admin user inside
# the running Gitea instance is preserved as-is.
# To rotate admin credentials, do so through Gitea's web UI or `gitea admin
# user change-password`, not through this values file.
gitea:
  admin:
    username: ""
    password: ""
    email: ""

  config:
    server:
      DOMAIN: gitea.home.yagamin.net
      ROOT_URL: https://gitea.home.yagamin.net
    # database / cache / session / queue connection strings that contain
    # secret material are injected via additionalConfigFromEnvs below.
    database:
      DB_TYPE: postgres
      HOST: gitea-postgres:5432
      NAME: gitea
      USER: gitea
    cache:
      ADAPTER: redis
    session:
      PROVIDER: redis
    queue:
      TYPE: redis
    actions:
      ENABLED: true
      DEFAULT_ACTIONS_URL: github

  # Inject secret-bearing settings via env. Gitea reads GITEA__section__KEY
  # at startup and overlays them onto app.ini. Order matters: REDIS_PASSWORD
  # must be defined before the $(REDIS_PASSWORD) references below.
  additionalConfigFromEnvs:
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: gitea-redis
          key: REDIS_PASSWORD
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db
          key: DB_PASSWORD
    - name: GITEA__cache__HOST
      value: "redis://:$(REDIS_PASSWORD)@gitea-redis:6379/0?pool_size=100&idle_timeout=180s"
    - name: GITEA__session__PROVIDER_CONFIG
      value: "redis://:$(REDIS_PASSWORD)@gitea-redis:6379/1?pool_size=100&idle_timeout=180s"
    - name: GITEA__queue__CONN_STR
      value: "redis://:$(REDIS_PASSWORD)@gitea-redis:6379/2?pool_size=100&idle_timeout=180s"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Gitea is a git server: large pushes (clone bundles, LFS, big commits) exceed
    # nginx's default `proxy-body-size: 1m` and fail with HTTP 413. Raise it well
    # above expected payloads. 512m mirrors the live hotfix that diagnosed this.
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
  # `gitea.home.yagamin.net` is the LAN host (direct ingress). `gitea.yagamin.net`
  # is the public host reached through the Cloudflare Tunnel + CF Access (mirrors
  # the icstv tv/studio pattern: same backend, second host rule, Host preserved).
  # The tunnel route is in cloudflared/tunnel-config.yaml; the CF Access app is
  # provisioned by scripts/cloudflared-ensure-access.sh (踏襲 studio.yagamin.net).
  # NOTE: gitea's ROOT_URL stays gitea.home.yagamin.net, so clone URLs / absolute
  # links rendered for the public host still point at the LAN host by design — the
  # public host is for browsing/admin under CF Access, not anonymous git-over-HTTP.
  # The cert for gitea.yagamin.net is issued by letsencrypt-prod via DNS-01
  # (Cloudflare), which works even though CF Access fronts the host.
  hosts:
    - host: gitea.home.yagamin.net
      paths:
        - path: /
          pathType: Prefix
    - host: gitea.yagamin.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - gitea.home.yagamin.net
      secretName: gitea-home-yagamin-net-tls
    - hosts:
        - gitea.yagamin.net
      secretName: gitea-yagamin-net-tls

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Subchart-bundled stacks are not used. gitea-postgres / gitea-redis are
# managed as independent StatefulSets under gitea/k8s/.
postgresql:
  enabled: false
postgresql-ha:
  enabled: false
redis-cluster:
  enabled: false
valkey-cluster:
  enabled: false
