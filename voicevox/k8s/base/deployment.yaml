apiVersion: apps/v1
kind: Deployment
metadata:
  name: voicevox
  namespace: voicevox
  labels:
    app: voicevox
    app.kubernetes.io/name: voicevox
    app.kubernetes.io/part-of: voicevox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voicevox
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: voicevox
        app.kubernetes.io/name: voicevox
        app.kubernetes.io/part-of: voicevox
    spec:
      # cp1 is memory-tight; prefer worker1 which has headroom (soft, not hard pin).
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["k8s-worker1"]
      containers:
        - name: voicevox-engine
          # Pinned to the verified running version for GitOps reproducibility
          # (digest sha256:eb8c7f46a7d01217d1ff2b6f018261faedeceded3cc756b4fbbf371791ad6c90).
          image: voicevox/voicevox_engine:cpu-0.25.2
          ports:
            - name: http
              containerPort: 50021
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              # 長文(天気予報の今日/明日ナレ ~60s)の合成でピークが 2Gi を超え OOMKilled に
              # なるため 4Gi へ。天気サブシステム側も合成を文単位に分割しピークを抑える。
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /version
              port: 50021
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /version
              port: 50021
            initialDelaySeconds: 40
            periodSeconds: 30
