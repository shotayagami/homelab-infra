apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.resourceNames.service }}
  namespace: {{ .Values.instance.namespace }}
  labels:
    app: misskey
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "misskey.webSelector" . | nindent 4 }}
