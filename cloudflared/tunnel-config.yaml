# Source-of-truth for the Cloudflare Tunnel "home-yagamin"
# (UUID 8b20116a-8d95-4f00-8edc-f50a647451c7).
#
# The tunnel is configured as remotely-managed in Cloudflare's Zero Trust
# dashboard, so this file is pushed to the CF API by
#   scripts/cloudflared-push-tunnel-config.sh
# which performs an idempotent PUT of /accounts/{aid}/cfd_tunnel/{tid}/configurations.
#
# DNS CNAME records must be created separately (see scripts/cloudflared-ensure-dns.sh).
ingress:
  # --- Puter (served by LXC 102 nginx at 192.168.11.151:80) ---
  # Use the LAN IP (not 127.0.0.1) because this same tunnel is also served by
  # the in-cluster cloudflared Deployment. Cloudflare distributes requests
  # across all connectors on the tunnel; `127.0.0.1` from a Pod would loop
  # back to the connector itself and 502. The LAN IP is reachable from
  # either connector (LXC 102 and RKE2 Pods).
  - hostname: puter.yagamin.net
    service: http://192.168.11.151:80
  - hostname: api.yagamin.net
    service: http://192.168.11.151:80
  - hostname: site.yagamin.net
    service: http://192.168.11.151:80
  - hostname: host.yagamin.net
    service: http://192.168.11.151:80
  - hostname: app.yagamin.net
    service: http://192.168.11.151:80
  - hostname: dev.yagamin.net
    service: http://192.168.11.151:80

  # --- Dev preview hosts (RKE2 ingress-nginx on cp1) ---
  # Host header is NOT rewritten; the ingress rule matches `dev-*.yagamin.net`
  # directly. The `X-Robots-Tag: noindex` header is added by the ingress
  # server-snippet to keep these hosts out of search engines.
  - hostname: dev-dealmatch.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-seller-dealmatch.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-buyer-dealmatch.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-pairs.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-mensbar.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-lilies.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true

  # --- ICS-TV (24h リニア配信のコントロールプレーン / RKE2 ingress-nginx) ---
  # Host は書き換えず保持 (Django セッション cookie の admin を出すため cookie ドメイン整合)。
  # tv = 本番 (公開番組表 + 内部 admin)、dev-tv = 開発 (関係者限定 preview)。
  # studio / dev-studio = 配信オペレータ向け UI。studio は CF Access で関係者限定、
  # dev-studio はその dev 版 (CF Access ポリシーは studio を踏襲)。
  #
  # NOTE: backend は in-cluster Service FQDN (icstv-web.icstv-dev.svc.cluster.local)
  # ではなく ingress-nginx の LAN IP 192.168.11.80:443 を指す。この tunnel は
  # RKE2 Pod 連結子と Puter LXC (LXC 102) 連結子で共有されており、CF は両連結子に
  # リクエストを振り分ける。svc.cluster.local は LXC 102 側から名前解決できず
  # 断続的 502 になるため、両連結子から到達可能な LAN IP を使う
  # ([[cloudflared-tunnel-homelab]] の Puter/127.0.0.1 ループ回避と同じ理由)。
  # ingress 側に dev-studio.yagamin.net の host ルールは登録済 (icstv-web / icstv-dev ns)。
  - hostname: tv.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-tv.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: studio.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-studio.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true

  # --- ICS-TV ops (放送コンソール / RKE2 ingress-nginx, CF Access protected) ---
  # studio から分離した運行オペレータ向け UI (@icstv/ops)。studio / dev-studio と同じく
  # 関係者限定で、CF Access ポリシーは studio.yagamin.net を踏襲する
  # (scripts/cloudflared-ensure-access.sh)。ops = 本番 (icstv ns)、dev-ops = 開発 (icstv-dev ns)。
  # NOTE: 2026-06-25 時点でバックエンド (RKE2 ingress 側の ops host ルール) は構築中のため、
  # 整うまでは認証通過後に ingress-nginx の 404 が返る (エッジ層を先行整備した状態)。
  - hostname: ops.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-ops.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true

  # --- ICS-TV deliver (業者向け納品ポータル / RKE2 ingress-nginx) ---
  # 外部の配信業者が素材を納品するための UI。studio.* / dev-studio.* と違い
  # **CF Access は付けない** — 業者がトンネル経由で到達できる必要があり、Access を
  # 挟むと弾かれるため。アクセス制御は Django 側の Google サインイン + 招待で担保する。
  # よって cloudflared-ensure-access.sh の対象に deliver を含めないこと。
  # deliver = 本番、dev-deliver = 開発。Host は書き換えず保持 (cookie ドメイン整合)。
  - hostname: deliver.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true
  - hostname: dev-deliver.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true

  # --- Gitea (RKE2 ingress-nginx, CF Access protected) ---
  # Public host for the internal Gitea (LAN host gitea.home.yagamin.net). Host is
  # preserved so ingress-nginx matches the `gitea.yagamin.net` rule added to the
  # gitea Helm release (gitea/values.yaml). CF Access (踏襲 studio policy) gates
  # this host at the edge — see scripts/cloudflared-ensure-access.sh. Gitea's
  # ROOT_URL stays internal by design (browsing/admin via Access, not anon git).
  - hostname: gitea.yagamin.net
    service: https://192.168.11.80:443
    originRequest:
      noTLSVerify: true

  # --- SSH over tunnel to admin-vm (192.168.11.10:22) ---
  # ドリフト取り込み (2026-06-25): このエントリは live tunnel config にのみ存在し
  # source-of-truth 未反映だった。ops/dev-ops 追加の push で誤って削除しないよう、
  # 既存のライブ設定を逐語で取り込む (`cloudflared access ssh` / WARP 経由 SSH 用)。
  - hostname: ssh.yagamin.net
    service: ssh://192.168.11.10:22

  # --- Catch-all (must be the last entry) ---
  - service: http_status:404

# WARP routing lets enrolled Cloudflare WARP devices reach private LAN
# resources (e.g. the FreePBX PBX at 192.168.11.57) through this tunnel's
# connectors, without exposing SIP/RTP (UDP) on a public hostname.
# The private-network route (CIDR -> tunnel) is registered separately in
# Zero Trust > Networks > Routes (not part of this configurations PUT).
warp-routing:
  enabled: true
