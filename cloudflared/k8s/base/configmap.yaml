apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: cloudflared-tunnel
data:
  # NOTE:
  # The tunnel is configured as remotely-managed (remote_config: true) in the
  # Cloudflare Zero Trust dashboard. The connector receives its `ingress`
  # array from the dashboard; an `ingress:` block here is overridden on every
  # reconnect and is therefore intentionally omitted.
  #
  # The source-of-truth for the ingress rules lives at
  # `cloudflared/tunnel-config.yaml` and is pushed via the CF API by
  # `scripts/cloudflared-push-tunnel-config.sh`.
  config.yaml: |
    tunnel: 8b20116a-8d95-4f00-8edc-f50a647451c7
    credentials-file: /etc/cloudflared/credentials/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
