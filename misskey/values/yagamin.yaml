# ============================================================================
# Misskey yagamin.com — 移行先 (受け入れ側) values
# vendored chart: misskey/chart (ics-corporate@fd9e5e8b, appVersion 2026.5.0)
# ============================================================================
# 移行元 yagamin-target-cluster.yaml をベースに、本クラスタ向けの結合修正を加えたもの。
#  - networkPolicy.ingressNamespaceLabel: ingress-nginx → kube-system
#    (本環境の nginx ingress は kube-system で稼働。chart default のままだと
#     default-deny-ingress で web pod への流入が全遮断される)
#  - ingress.clusterIssuer: selfsigned-issuer (Tunnel 背後で origin 証明書は信頼不要)
#  - objectStorage: 現環境の R2 設定を流用 (bucket yagamincom / prefix misskey /
#    files.yagamin.com)。endpoint(account_id) は公開 repo 非露出のため secret 注入
# secret 契約: db.passwordSecret / setupPasswordSecret は chart default の
# `misskey-secret` のまま (土台と同一 single source of truth)。
# ※ url/host (= yagamin.com) は連合維持のため絶対に変更しない
# ============================================================================

instance:
  name: yagamin
  namespace: misskey
  url: https://yagamin.com
  host: yagamin.com

db:
  # 専用 PostgreSQL 18 (misskey namespace 内、土台 misskey/k8s)
  host: misskey-postgres.misskey.svc.cluster.local
  port: 5432
  name: misskey
  user: misskey
  # passwordSecret は chart default (misskey-secret / DB_PASSWORD) を使用

meilisearch:
  enabled: true
  host: meilisearch.misskey.svc.cluster.local
  port: 7700
  # master key は values 平文に置かず secret から注入。
  # misskey-secret の MEILISEARCH_API_KEY = 土台 Meilisearch の MEILI_MASTER_KEY。
  apiKeyFromSecret: true
  ssl: false
  index: yagamin-com

# アップロードは Cloudflare R2 (現環境の設定をそのまま流用)。R2 は外部・共有
# ストレージのため、新クラスタが同じ bucket/prefix を指すだけでファイル移送は不要。
# accessKey / secretKey は misskey-secret の OBJECT_STORAGE_ACCESS_KEY /
# OBJECT_STORAGE_SECRET_KEY から initContainer が sed 注入する (現環境の既存キーを流用)。
objectStorage:
  enabled: true
  baseUrl: https://files.yagamin.com
  bucket: yagamincom
  prefix: misskey
  # endpoint(=account_id) は公開リポジトリに出さないため secret 注入。
  # misskey-secret の OBJECT_STORAGE_ENDPOINT を chart の initContainer が sed 置換する。
  endpoint: "__OBJECT_STORAGE_ENDPOINT__"
  region: auto
  useSSL: true
  s3ForcePathStyle: true
  setPublicRead: false

# レプリカ 1 固定 (HPA 不使用)。
replicas:
  web: 1

hpa:
  enabled: false

ingress:
  tlsSecretName: misskey-tls
  # selfsigned: Tunnel(noTLSVerify)背後なので origin 証明書は公開信頼不要。
  # step-ca/letsencrypt は ACME チャレンジ検証が要るが、公開ドメイン yagamin.com を
  # 内部CAで HTTP-01 検証するのは hairpin で不成立 (solver も default-deny に阻まれる)。
  # selfsigned-issuer は即時発行 (チャレンジ不要) でループを起こさない。
  clusterIssuer: selfsigned-issuer

networkPolicy:
  # ★ 本環境の nginx ingress は kube-system namespace で稼働
  ingressNamespaceLabel: kube-system
  # 専用 PG / Meilisearch が misskey namespace 内のため egress 先を同一 ns に
  databasesNamespaceLabel: misskey
  meilisearchNamespaceLabel: misskey
