apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.resourceNames.redisDeployment }}
  namespace: {{ .Values.instance.namespace }}
  labels:
    app: misskey
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "misskey.redisSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "misskey.redisSelector" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.resourceNames.redisService }}
  namespace: {{ .Values.instance.namespace }}
  labels:
    app: misskey
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    {{- include "misskey.redisSelector" . | nindent 4 }}
